services:
  - type: web
    name: day4-flask-board
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python seed.py && gunicorn app:app
    envVars:
      - key: DATABASE_PATH
        value: /var/data/board.db
    disk:
      name: day4-flask-disk
      mountPath: /var/data
      sizeGB: 1
