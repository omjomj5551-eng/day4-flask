<!DOCTYPE html>
<html class="light" lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>게시판</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,200..800;1,6..72,200..800&family=Plus+Jakarta+Sans:wght@200..800&display=swap" rel="stylesheet" />
  <style>
    body { background-color: #FDFBF7; color: #2D2926; font-family: "Newsreader", serif; }
  </style>
</head>
<body class="antialiased">
  <header class="border-b border-[#F5F0E6] sticky top-0 bg-[#FDFBF7]">
    <div class="flex justify-between items-center px-8 py-6 max-w-screen-xl mx-auto">
      <div class="text-2xl italic font-semibold">저널</div>
      <a href="{{ url_for('create_post') }}" class="px-6 py-2 border border-[#2D2926] hover:bg-stone-100">글쓰기</a>
    </div>
  </header>

  <main class="max-w-[720px] mx-auto px-6 pt-24 pb-12">
    <header class="mb-16 text-center">
      <span class="text-xs tracking-[0.1em] text-[#6e5b44] block mb-6 font-semibold" style="font-family: 'Plus Jakarta Sans', sans-serif;">모아 둔 생각</span>
      <h1 class="text-5xl mb-8">디지털 시대, 천천히 사는 삶에 대한 기록</h1>
      <div class="w-16 h-px bg-[#cfc4bd] mx-auto"></div>
    </header>

    <section class="space-y-12">
      {% for post in posts %}
      <article class="border-b border-[#F5F0E6] pb-8">
        <div class="flex items-center gap-3 mb-3 text-sm text-[#6e5b44]" style="font-family: 'Plus Jakarta Sans', sans-serif;">
          <span>{{ post.created_at }}</span>
        </div>
        <h2 class="text-3xl mb-3 hover:text-[#6e5b44]">
          <a href="{{ url_for('post_detail', post_id=post.id) }}">{{ post.title }}</a>
        </h2>
        <p class="text-lg text-[#4d4540] line-clamp-2">{{ post.content }}</p>
      </article>
      {% else %}
      <p class="text-[#4d4540]">아직 작성된 글이 없습니다. 첫 글을 작성해 보세요.</p>
      {% endfor %}
    </section>
  </main>
</body>
</html>
