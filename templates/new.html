<!DOCTYPE html>
<html class="light" lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>글쓰기 - 저널</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,200..800;1,6..72,200..800&family=Plus+Jakarta+Sans:wght@200..800&display=swap" rel="stylesheet" />
  <style>
    body { background-color: #FDFBF7; color: #2D2926; font-family: "Newsreader", serif; }
    input:focus, textarea:focus { outline: none; box-shadow: none; }
  </style>
</head>
<body>
  <header class="border-b border-[#F5F0E6] sticky top-0 bg-[#FDFBF7]">
    <div class="flex justify-between items-center px-8 py-6 max-w-screen-xl mx-auto">
      <div class="text-2xl italic font-semibold">저널</div>
      <a href="{{ url_for('list_posts') }}" class="px-6 py-2 border border-[#2D2926] hover:bg-stone-100">목록으로</a>
    </div>
  </header>

  <main class="max-w-[720px] mx-auto px-[20px] md:px-0 mt-16 mb-20">
    <form method="post" action="{{ url_for('create_post') }}" class="space-y-10">
      <div>
        <label for="title" class="sr-only">Title</label>
        <input id="title" name="title" type="text" required placeholder="제목을 입력하세요"
               class="w-full bg-transparent border-none p-0 text-5xl placeholder:italic placeholder:text-stone-400" />
      </div>

      <div class="h-px bg-[#cfc4bd]"></div>

      <div>
        <label for="content" class="sr-only">내용</label>
        <textarea id="content" name="content" required placeholder="내용을 입력하세요"
                  class="w-full min-h-[380px] bg-transparent border-none p-0 text-2xl leading-relaxed resize-none"></textarea>
      </div>

      <div class="flex justify-end">
        <button type="submit" class="bg-[#2D2926] text-[#FDFBF7] px-8 py-3" style="font-family: 'Plus Jakarta Sans', sans-serif; letter-spacing: .1em; font-size: 12px;">발행</button>
      </div>
    </form>
  </main>
</body>
</html>
