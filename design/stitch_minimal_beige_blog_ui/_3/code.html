<!DOCTYPE html>

<style>
        body {
            background-color: #FDFBF7;
            color: #2D2926;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
            vertical-align: middle;
        }
        input:focus, textarea:focus {
            outline: none;
            box-shadow: none;
        }
        ::placeholder {
            color: #A8A29E;
            opacity: 0.6;
        }
    </style>
</head>
<body class="bg-background text-on-background selection:bg-secondary-container selection:text-on-secondary-container">
<!-- TopAppBar -->
<header class="bg-[#FDFBF7] dark:bg-[#1A1A1A] docked full-width top-0 z-50 sticky border-b border-[#F5F0E6] dark:border-[#2D2926]">
<div class="flex justify-between items-center px-8 py-6 max-w-screen-xl mx-auto">
<div class="font-serif text-2xl italic font-semibold text-[#2D2926] dark:text-[#EAEAEA]">
                Journal
            </div>
<nav class="hidden md:flex items-center gap-10 font-serif font-light text-lg tracking-tight">
<a class="text-stone-500 dark:text-stone-400 hover:text-[#2D2926] transition-colors" href="#">Essays</a>
<a class="text-stone-500 dark:text-stone-400 hover:text-[#2D2926] transition-colors" href="#">Library</a>
<a class="text-stone-500 dark:text-stone-400 hover:text-[#2D2926] transition-colors" href="#">About</a>
</nav>
<div class="flex items-center gap-6">
<button class="font-serif font-light text-lg tracking-tight text-[#2D2926] dark:text-white border-b border-[#2D2926] dark:border-white pb-1 scale-95 active:scale-100 transition-transform">
                    Write
                </button>
<div class="md:hidden flex items-center">
<span class="material-symbols-outlined text-on-surface">menu</span>
</div>
</div>
</div>
</header>
<!-- Main Editor Canvas -->
<main class="max-w-[720px] mx-auto px-margin-mobile md:px-0 mt-16 md:mt-24 mb-section-gap">
<form class="space-y-12">
<!-- Metadata and Toolbar -->
<div class="flex flex-col md:flex-row md:items-center justify-between gap-4 border-b border-outline-variant pb-6 mb-12">
<div class="flex items-center gap-4">
<span class="bg-secondary-container text-on-secondary-container px-3 py-1 font-label-caps text-label-caps">Draft</span>
<span class="font-label-md text-label-md text-on-surface-variant italic">Last saved 2 minutes ago</span>
</div>
<div class="flex items-center gap-6">
<button class="flex items-center gap-2 font-label-md text-label-md text-on-surface-variant hover:text-primary transition-colors" type="button">
<span class="material-symbols-outlined" data-icon="settings">settings</span>
                        Settings
                    </button>
<button class="flex items-center gap-2 font-label-md text-label-md text-on-surface-variant hover:text-primary transition-colors" type="button">
<span class="material-symbols-outlined" data-icon="visibility">visibility</span>
                        Preview
                    </button>
<button class="bg-primary text-on-primary px-6 py-2 font-label-caps text-label-caps hover:bg-on-surface-variant transition-colors shadow-sm" type="submit">
                        Publish
                    </button>
</div>
</div>
<!-- Editor Fields -->
<section class="flex flex-col gap-8">
<div class="group">
<label class="sr-only" for="title">Essay Title</label>
<input class="w-full bg-transparent border-none p-0 font-h1 text-h1 placeholder:italic placeholder:font-light" id="title" name="title" placeholder="Title of your essay..." type="text"/>
</div>
<div class="flex items-center gap-4 text-on-surface-variant opacity-40">
<div class="h-px flex-1 bg-outline-variant"></div>
<span class="material-symbols-outlined text-sm" data-icon="article">article</span>
<div class="h-px flex-1 bg-outline-variant"></div>
</div>
<div class="min-h-[500px]">
<label class="sr-only" for="content">Main Content</label>
<textarea class="w-full min-h-[500px] bg-transparent border-none p-0 font-body-lg text-body-lg resize-none leading-relaxed" id="content" name="content" placeholder="Begin your slow thought here..."></textarea>
</div>
</section>
<!-- Media Insertion (Contextual UI) -->
<div class="border-t border-outline-variant pt-12 flex flex-col gap-8">
<h3 class="font-label-caps text-label-caps text-on-surface-variant">Featured Image</h3>
<div class="relative w-full aspect-[21/9] bg-surface-container border border-dashed border-outline-variant group hover:border-primary transition-colors flex flex-col items-center justify-center cursor-pointer">
<img alt="editorial photography" class="absolute inset-0 w-full h-full object-cover opacity-20 grayscale transition-opacity group-hover:opacity-30" data-alt="minimalist overhead shot of a wooden desk with a vintage typewriter, a ceramic mug, and soft morning light" src="https://lh3.googleusercontent.com/aida-public/AB6AXuA7RW6IHz8HGtdb-4VjEdMOJy39YIEMLkdSsLVkvqW_z6x1CHw8BvCt_nqPzfxLws3sq28e4T2AVeOdtOVWKgatoP8nE5p512za_1sCrzOhcWRBhevvLWla9z8Yk4WeV4NnuNkoLz5CGamlntPwy-A6bZkDbnCg4EgDJv3N1mrlPEB6He3YbKuURdYLhin8odrTvVVN5ylC6e8jtuGbrgmcxFLeagmMrM_eM6Y26IDy2ww6MZtzUGawjC_B_QECMepida3Tb1_N5N0"/>
<div class="relative z-10 flex flex-col items-center gap-3">
<span class="material-symbols-outlined text-3xl" data-icon="add_photo_alternate">add_photo_alternate</span>
<span class="font-label-md text-label-md text-on-surface-variant">Click to upload cover photo</span>
</div>
</div>
</div>
</form>
</main>
<!-- Footer -->
<footer class="bg-[#FDFBF7] dark:bg-[#1A1A1A] w-full mt-24 border-t border-[#F5F0E6] dark:border-[#2D2926]">
<div class="max-w-[720px] mx-auto py-16 px-6 flex flex-col items-center gap-6 text-center">
<div class="flex flex-wrap justify-center gap-8 font-serif text-sm tracking-wide text-stone-400 dark:text-stone-600">
<a class="hover:text-[#2D2926] dark:hover:text-stone-100 underline decoration-stone-200 opacity-80 hover:opacity-100 transition-opacity" href="#">Archive</a>
<a class="hover:text-[#2D2926] dark:hover:text-stone-100 underline decoration-stone-200 opacity-80 hover:opacity-100 transition-opacity" href="#">Newsletter</a>
<a class="hover:text-[#2D2926] dark:hover:text-stone-100 underline decoration-stone-200 opacity-80 hover:opacity-100 transition-opacity" href="#">Privacy</a>
<a class="hover:text-[#2D2926] dark:hover:text-stone-100 underline decoration-stone-200 opacity-80 hover:opacity-100 transition-opacity" href="#">Contact</a>
</div>
<p class="font-serif text-sm tracking-wide text-stone-400 dark:text-stone-600 opacity-80">
                © 2024 Digital Slow Living. Crafted for clarity.
            </p>
</div>
</footer>
<!-- Editor Floating Controls -->
<div class="fixed bottom-8 left-1/2 -translate-x-1/2 bg-on-surface shadow-2xl px-6 py-3 flex items-center gap-8 z-40 rounded-full">
<button class="text-surface hover:text-secondary-fixed transition-colors">
<span class="material-symbols-outlined" data-icon="format_bold">format_bold</span>
</button>
<button class="text-surface hover:text-secondary-fixed transition-colors">
<span class="material-symbols-outlined" data-icon="format_italic">format_italic</span>
</button>
<button class="text-surface hover:text-secondary-fixed transition-colors">
<span class="material-symbols-outlined" data-icon="link">link</span>
</button>
<div class="w-px h-4 bg-surface-variant opacity-20"></div>
<button class="text-surface hover:text-secondary-fixed transition-colors">
<span class="material-symbols-outlined" data-icon="format_quote">format_quote</span>
</button>
<button class="text-surface hover:text-secondary-fixed transition-colors">
<span class="material-symbols-outlined" data-icon="list">list</span>
</button>
<div class="w-px h-4 bg-surface-variant opacity-20"></div>
<div class="font-label-md text-label-md text-secondary-fixed">
            242 words
        </div>
</div>
</body></html>
